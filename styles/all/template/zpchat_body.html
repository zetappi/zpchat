<!-- IF S_ZPCHAT_USER_LOGGED -->
<div id="zpchat-container" class="zpchat-minimized"
     data-refresh="{ZPCHAT_REFRESH_INTERVAL}"
     data-user-id="{ZPCHAT_USER_ID}"
     data-user-color="{ZPCHAT_USER_COLOR}"
     data-username="{ZPCHAT_USERNAME}"
     data-url-send="{ZPCHAT_URL_SEND}"
     data-url-messages="{ZPCHAT_URL_MESSAGES}"
     data-url-sse="{ZPCHAT_URL_SSE}"
     data-use-sse="1"
     data-bg-color="{ZPCHAT_BG_COLOR}"
     data-bg-own="{ZPCHAT_BG_OWN}"
     data-bg-other="{ZPCHAT_BG_OTHER}"
     data-header-color="{ZPCHAT_HEADER_COLOR}"
     data-button-color="{ZPCHAT_BUTTON_COLOR}"
     data-width="{ZPCHAT_WIDTH}"
     data-height="{ZPCHAT_HEIGHT}">
    <div class="zpchat-header">
        <span class="zpchat-title">Chat Globale</span>
        <button id="zpchat-global-switch" class="zpchat-global-switch" style="display:none;" title="Torna alla chat globale">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            Globale
        </button>
        <span id="zpchat-status" class="zpchat-status"></span>
        <button id="zpchat-mute" class="zpchat-mute" title="Silenzia chat"><svg viewBox="0 0 24 24" width="16" height="16" fill="#fff"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg></button>
        <button id="zpchat-close" class="zpchat-close" title="Chiudi chat">&times;</button>
    </div>
    <div id="zpchat-messages" class="zpchat-messages"></div>
    <form id="zpchat-form" class="zpchat-form">
        <input type="text" id="zpchat-input" class="zpchat-input" placeholder="Scrivi un messaggio..." autocomplete="off" maxlength="500">
        <button type="submit" class="zpchat-submit">Invia</button>
    </form>
</div>
<!-- ENDIF -->
